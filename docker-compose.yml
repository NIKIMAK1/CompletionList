services:
  db:
    image: postgres:16
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB: completion_list
      POSTGRES_USER: completion_user
      POSTGRES_PASSWORD: completion_password
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U completion_user -d completion_list"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: sh -lc "uv sync --frozen && uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22
    working_dir: /app
    command: bash -lc "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_venv:
  frontend_node_modules:
  frontend_next:
